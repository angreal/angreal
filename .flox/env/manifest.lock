    "hook": {
      "on-activate": "  # Create a venv for maturin develop builds if it doesn't exist\n  if [ ! -d \"$FLOX_ENV_PROJECT/.dev-venv\" ]; then\n    echo \"Creating development venv...\"\n    uv venv \"$FLOX_ENV_PROJECT/.dev-venv\" --python \"$FLOX_ENV/bin/python3\"\n    echo \"Installing dev dependencies...\"\n    uv pip install --python \"$FLOX_ENV_PROJECT/.dev-venv/bin/python\" pip maturin pytest\n  fi\n\n  # Set VIRTUAL_ENV so maturin finds the venv\n  export VIRTUAL_ENV=\"$FLOX_ENV_PROJECT/.dev-venv\"\n"
    },
    "profile": {
      "common": "  # Activate the dev venv so pip/python resolve correctly\n  source \"$FLOX_ENV_PROJECT/.dev-venv/bin/activate\" 2>/dev/null || true\n"
    },
